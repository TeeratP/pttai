site_name: pttai
site_description: Pythonic Topology Tools for AI — a declarative >-DSL over LangGraph with a build-time dataflow validator, compiled to native LangGraph.
site_url: https://teeratp.github.io/pttai/
repo_url: https://github.com/TeeratP/pttai
repo_name: TeeratP/pttai

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# Never build these internal, untracked files into the public site.
exclude_docs: |
  project.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            merge_init_into_class: true
            show_root_heading: true
            show_source: false
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details

nav:
  - Home: index.md
  - The validator: validator.md
  - Quickstart: quickstart.md
  - Getting started: getting-started.md
  - Coming from LangGraph: coming-from-langgraph.md
  - Node types: node-types.md
  - Examples:
      - Basics: examples/basics.md
      - Architectures: examples/architectures.md
  - API Reference:
      - Graph: api/graph.md
      - Nodes: api/nodes.md
      - State: api/state.md
      - Advanced: api/advanced.md
